<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Mantra Health Care</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
.gallery{
    width:90%;
    margin:auto;
    padding:40px 0;
}

.gallery h1{
    text-align:center;
    color:#0d6efd;
    margin-bottom:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    text-align:center;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    padding:15px;
}

@media(max-width:768px){
.cards{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:500px){
.cards{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<header>
<nav class="navbar">

<h2 class="logo">
<i class="fa-solid fa-heart-pulse"></i> Mantra Health Care
</h2>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="gallery.html" class="active">Gallery</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</nav>
</header>

<section class="gallery">

<h1>Hospital Gallery</h1>

<div class="cards">

<div class="card">
<img src="images/banner.jpg" alt="">
<h3>Hospital Building</h3>
</div>

<div class="card">
<img src="images/team.jpg" alt="">
<h3>Medical Team</h3>
</div>

<div class="card">
<img src="images/doctor1.jpg" alt="">
<h3>Senior Doctor</h3>
</div>

<div class="card">
<img src="images/doctor2.jpg" alt="">
<h3>Patient Care</h3>
</div>

<div class="card">
<img src="images/doctor3.jpg" alt="">
<h3>Emergency Care</h3>
</div>

</div>

</section>

<footer>
<p>© 2026 Mantra Health Care | All Rights Reserved.</p>
</footer>

</body>
</html>
